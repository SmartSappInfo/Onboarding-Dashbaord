# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

  # Environment variables and secrets.
  # env:
  # Configure environment variables.
  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  # - variable: MESSAGE
  #   value: Hello world!
  #   availability:
  #     - BUILD
  #     - RUNTIME

  # Grant access to secrets in Cloud Secret Manager.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  # - variable: MY_SECRET
  #   secret: mySecretRef
env:
  - variable: CRON_SECRET
    secret: cron-secret
  - variable: WHATSAPP_ENCRYPTION_KEY
    secret: whatsapp-encryption-key
  - variable: RESEND_WEBHOOK_SECRET
    secret: resend-webhook-secret
  - variable: RESEND_API_KEY
    secret: resend-api-key
  - variable: MNOTIFY_API_KEY
    secret: mnotify-api-key
  - variable: ONESIGNAL_APP_ID
    secret: onesignal-app-id
  - variable: ONESIGNAL_REST_API_KEY
    secret: onesignal-rest-api-key
  # Resend "from" domain — NOT a secret. Code defaults to "smartsapp.com" if unset.
  # Uncomment and set this to your VERIFIED Resend sending domain if it differs
  # (the from-domain must be verified under RESEND_API_KEY or Resend rejects sends).
  # - variable: RESEND_DOMAIN
  #   value: go.smartsapp.com
  #   availability:
  #     - RUNTIME
